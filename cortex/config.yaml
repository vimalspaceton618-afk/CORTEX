# CORTEX Configuration

teachers:
  - name: "GroqLlama"
    provider: "groq"
    api_key_env: "GROQ_API_KEY"
    model_id: "llama-3.3-70b-versatile"
    base_url: "https://api.groq.com/openai/v1"
    max_tokens: 4096
    temperature: 0.7
    enabled: true

  - name: "BuddyTeacher"
    provider: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"
    model_id: "claude-opus-4-6-20250514"
    max_tokens: 4096
    temperature: 0.7
    enabled: true

king:
  github_token_env: "GITHUB_TOKEN"
  user_agent: "CORTEX-King/1.0"
  request_timeout: 30

knowledge:
  # Main CORTEX_DATA path (Z: drive or other storage)
  storage_path: "Z:/cortex_data"
  embedding_model: "all-MiniLM-L6-v2"
  use_faiss: true
  similarity_threshold: 0.85

# Agent AI OS configuration
agents:
  enabled_agents: ["researcher", "coder", "verifier", "architect"]
  max_agents_per_task: 3
  debate_rounds: 2

reasoning:
  max_reasoning_steps: 10
  max_reflection_cycles: 3
  reasoning_mode: "chain"
  use_teacher_for_reasoning: true

tools:
  enabled_tools: ["python_repl", "filesystem", "web_search"]
  code_timeout: 30

memory:
  episodic_max: 1000
  consolidation_threshold: 5
  working_context_tokens: 8000
  decay_half_life_days: 30

planning:
  max_plan_depth: 5
  enable_rollback: true
  max_retries: 3

default_mode: "agent"  # "compat" or "agent"

# GPU Training configuration (used by gpu-train command)
training:
  # Default pretrained store location (can override with --pretrained-dir)
  pretrained_dir: "E:/pretrained_store"
  batch_size: 50
  embedding_batch_size: 32
  save_interval: 100
